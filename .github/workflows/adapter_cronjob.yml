name: Adapters Cron

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-adapters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run Adapters Orchestrator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          LLM_STATS_API_KEY: ${{ secrets.LLM_STATS_API_KEY }}
        # UPDATED PATH: Pointing to utils/scripts/run_adapters.py
        run: uv run python utils/scripts/run_adapters.py
