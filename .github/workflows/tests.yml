name: tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
            enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev --extra helm --extra inspect

      - name: Run tests
        run: uv run pytest