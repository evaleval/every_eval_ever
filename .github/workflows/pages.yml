name: Validate Docs and Trigger Website Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Sync project
        run: uv sync --dev

      - name: Lint docs workflow
        run: uv run ruff check tools/build_docs.py tools/serve_docs.py tests/test_docs_deployment.py tests/test_pandoc_docs_workflow.py tests/test_docs_dev_server.py

      - name: Test docs workflow
        run: uv run pytest tests/test_docs_deployment.py tests/test_pandoc_docs_workflow.py tests/test_docs_dev_server.py

      - name: Build docs for website route
        run: uv run tools/build_docs.py --base-url /projects/every-eval-ever/docs --site-url https://evalevalai.com --output _site

      - name: Verify docs route
        run: |
          test -f _site/index.html
          test -f _site/getting-started/index.html
          test -f _site/data-model/index.html
          test -f _site/validation/index.html
          test -f _site/converters/index.html
          test -f _site/hf-community-evals/index.html
          test -f _site/contributing/index.html
          test -f _site/assets/docs.css
          test -f _site/assets/docs.js
          test -f _site/assets/eee-logo.png
          test -f _site/assets/search-index.json
          grep -R 'href="/projects/every-eval-ever/docs' _site
          grep -R 'src="/projects/every-eval-ever/docs/assets/docs.js' _site
          grep -R 'src="/projects/every-eval-ever/docs/assets/eee-logo.png' _site
          grep -R 'href="/projects/every-eval-ever/docs/assets/docs.css' _site
          if grep -R 'href="/every_eval_ever' _site; then
            echo "::error::Docs build still links to /every_eval_ever"
            exit 1
          fi
          if grep -R 'src="/every_eval_ever' _site; then
            echo "::error::Docs build still loads assets from /every_eval_ever"
            exit 1
          fi

  legacy-redirect:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    steps:
      - name: Generate legacy redirect site
        run: |
          mkdir -p legacy_site
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<link rel="canonical" href="https://evalevalai.com/projects/every-eval-ever/docs/">' \
            '<meta http-equiv="refresh" content="0; url=https://evalevalai.com/projects/every-eval-ever/docs/">' \
            '<script>location.replace("https://evalevalai.com/projects/every-eval-ever/docs/" + location.search + location.hash);</script>' \
            '<a href="https://evalevalai.com/projects/every-eval-ever/docs/">Every Eval Ever documentation has moved.</a>' \
            > legacy_site/index.html
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<link rel="canonical" href="https://evalevalai.com/projects/every-eval-ever/docs/">' \
            '<meta http-equiv="refresh" content="0; url=https://evalevalai.com/projects/every-eval-ever/docs/">' \
            '<script>' \
            'const legacyPrefix = "/every_eval_ever";' \
            'const docsBase = "/projects/every-eval-ever/docs";' \
            'const suffix = location.pathname.startsWith(legacyPrefix) ? location.pathname.slice(legacyPrefix.length) : "/";' \
            'location.replace(docsBase + suffix + location.search + location.hash);' \
            '</script>' \
            '<a href="https://evalevalai.com/projects/every-eval-ever/docs/">Every Eval Ever documentation has moved.</a>' \
            > legacy_site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./legacy_site

  deploy-legacy-redirect:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: legacy-redirect
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  trigger-website-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger evaleval.github.io deployment
        env:
          GH_TOKEN: ${{ secrets.EVALEVAL_WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing EVALEVAL_WEBSITE_DISPATCH_TOKEN secret. Add a token that can create repository_dispatch events on evaleval/evaleval.github.io."
            exit 1
          fi
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/evaleval/evaleval.github.io/dispatches \
            -d '{"event_type":"every-eval-ever-docs","client_payload":{"source_repo":"evaleval/every_eval_ever","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}"}}'
