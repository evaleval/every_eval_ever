site:
  title: Every Eval Ever Docs
  description: Contributor documentation for the Every Eval Ever schema, validator, converters, and datastore workflow.
  repository: https://github.com/evaleval/every_eval_ever
  datastore: https://huggingface.co/datasets/evaleval/EEE_datastore
items:
  - title: Home
    route: /
    source: pages/home.md
    description: Start from the contributor workflow and find the right path through Every Eval Ever.
  - title: Getting Started
    route: /getting-started/
    source: pages/getting-started.md
    description: Install the project, run the CLI, and choose a contribution path.
  - title: Data Model
    route: /data-model/
    source: pages/data-model.md
    description: Understand aggregate records, instance-level JSONL, schema versions, and datastore layout.
  - title: Validation
    route: /validation/
    source: pages/validation.md
    description: Validate files locally and understand the Hugging Face datastore PR bot.
  - title: Converters
    route: /converters/
    source: pages/converters.md
    description: Convert Inspect AI, HELM, lm-eval-harness, and AlpacaEval results into the shared schema.
  - title: HF Community Evals
    route: /hf-community-evals/
    source: pages/hf-community-evals.md
    description: Review EEE datastore collections and prepare Hugging Face Community Evals YAML entries.
  - title: Contributing
    route: /contributing/
    source: pages/contributing.md
    description: Prepare datastore folders, UUID-named files, provenance, and review-ready pull requests.
